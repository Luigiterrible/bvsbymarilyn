        <script defer data-name="navigation-logic">
          document.addEventListener('DOMContentLoaded', function() {
            (function(){
              const mobileMenuOpen = document.getElementById("mobile-menu-open")
              const mobileMenuClose = document.getElementById("mobile-menu-close")
              const mobileOverlay = document.getElementById("mobile-overlay")

              function openMenu() {
                mobileOverlay.classList.add("is-open")
                mobileOverlay.setAttribute("aria-hidden", "false")
                mobileMenuOpen.setAttribute("aria-expanded", "true")
                document.body.style.overflow = "hidden"
              }

              function closeMenu() {
                mobileOverlay.classList.remove("is-open")
                mobileOverlay.setAttribute("aria-hidden", "true")
                mobileMenuOpen.setAttribute("aria-expanded", "false")
                document.body.style.overflow = ""
              }

              mobileMenuOpen.addEventListener("click", openMenu)
              mobileMenuClose.addEventListener("click", closeMenu)

              mobileOverlay.addEventListener("click", (e) => {
                if (e.target === mobileOverlay) {
                  closeMenu()
                }
              })

              document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && mobileOverlay.classList.contains("is-open")) {
                  closeMenu()
                }
              })

              const mobileLinks = mobileOverlay.querySelectorAll(".navigation-mobile-link")
              mobileLinks.forEach((link) => {
                link.addEventListener("click", closeMenu)
              })
            })()
          });
        </script>
      </div>
